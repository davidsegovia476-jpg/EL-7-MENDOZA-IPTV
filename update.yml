name: Actualizar Canal 7 Permanente

on:
  schedule:
    # Se ejecuta de forma automática solo los lunes a la madrugada
    - cron: '0 0 * * 1'
  workflow_dispatch: # Activar manualmente cuando desees

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ejecutar creador de M3U
      run: python grabber.py

    - name: Forzar subida del archivo a GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # El comando touch asegura que el archivo exista bajo cualquier circunstancia
        touch canal7mendoza.m3u
        git add canal7mendoza.m3u
        
        # Sube el archivo de forma limpia y evita errores si no hay cambios bruscos
        git commit -m "Actualización del stream oficial nativo de Mendoza" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

