name: Actualizar Canal 7 Token Real

on:
  schedule:
    - cron: '0 0 * * *' # Corre de forma automática una vez al día para mantenimiento
  workflow_dispatch: # Activa el botón gris para correrlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar credenciales de Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"

    - name: Crear archivo M3U con tu URL exacta de Google Video
      run: |
        # Escribimos el formato IPTV y tu enlace de forma directa en la terminal de Linux
        echo "#EXTM3U" > canal7mendoza.m3u
        echo '#EXTINF:-1 tvg-id="Canal7Mendoza" tvg-name="Canal 7 Mendoza" tvg-logo="https://elsietetv.com.ar" group-title="Mendoza",Canal 7 Mendoza' >> canal7mendoza.m3u
        echo "https://googlevideo.com' >> canal7mendoza.m3u
        
        echo "¡Archivo canal7mendoza.m3u creado con éxito!"

    - name: Guardar cambios de forma obligatoria en GitHub
      run: |
        # Agregamos el archivo recién creado
        git add canal7mendoza.m3u
        
        # Guardamos cambios. El comando '|| true' evita que el proceso falle si el link ya estaba guardado
        git commit -m "Lista M3U actualizada con enlace directo de Google Video" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

