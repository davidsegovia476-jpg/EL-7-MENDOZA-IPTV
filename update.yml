name: Actualizar Canal 7 Token Real

on:
  schedule:
    # Se ejecuta automáticamente cada 3 horas para renovar el token antes de que venza
    - cron: '0 */3 * * *'
  workflow_dispatch: # Botón gris para correrlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar credenciales de Git primero
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"

    - name: Ejecutar script extractor
      run: python grabber.py

    - name: Guardar cambios de forma segura en tu repositorio
      run: |
        # Verificamos que el archivo fue creado por Python antes de intentar sumarlo
        if [ -f "canal7mendoza.m3u" ]; then
          git add canal7mendoza.m3u
          # Hace el commit sólo si el token cambió, evitando errores si es idéntico
          git diff-index --quiet HEAD || git commit -m "Token .m3u8 de Google Video renovado"
          git push
        else
          echo "El archivo canal7mendoza.m3u no se generó. Saltando guardado."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

