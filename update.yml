name: Actualizar Lista IPTV Mendoza

on:
  schedule:
    # Se ejecuta de forma automática una vez a la semana como mantenimiento básico
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permite que lo actives tú manualmente cuando quieras con el botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ejecutar creador de M3U
      run: python grabber.py

    - name: Forzar guardado en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # El comando touch crea un archivo en blanco si no existiera, solucionando el error fatal
        touch canal7mendoza.m3u
        git add canal7mendoza.m3u
        
        # Realiza el commit y sube los cambios de manera segura
        git commit -m "Actualización de URL m3u8 nativa" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

