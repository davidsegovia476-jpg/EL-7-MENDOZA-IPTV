name: Actualizar Canal 7 Fijo

on:
  schedule:
    # Se ejecuta de forma automática una vez al día para mantenimiento básico
    - cron: '0 0 * * *'
  workflow_dispatch: # Te activa el botón gris para correrlo cuando tú quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar credenciales de Git primero
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"

    - name: Ejecutar script extractor
      run: python grabber.py

    - name: Guardar cambios en el repositorio de forma segura
      run: |
        # Verificamos que Python ya creó el archivo antes de añadirlo
        if [ -f "canal7mendoza.m3u" ]; then
          git add canal7mendoza.m3u
          # Hace el commit solo si hay algún cambio real, si no, salta en verde sin romperse
          git diff-index --quiet HEAD || git commit -m "Lista M3U con ID fijo de YouTube actualizada"
          git push
        else
          echo "El archivo canal7mendoza.m3u no se encontró. Saltando guardado."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

