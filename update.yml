name: Actualizar Canal 7 M3U

on:
  schedule:
    # Se ejecuta automáticamente cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch: # Te permite activarlo manualmente desde GitHub cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        pip install requests

    - name: Ejecutar script extractor
      run: python grabber.py

    - name: Guardar cambios en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add canal7mendoza.m3u
        # Solo hace el commit si el enlace cambió de ID
        git diff-index --quiet HEAD || git commit -m "URL de YouTube actualizada"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

