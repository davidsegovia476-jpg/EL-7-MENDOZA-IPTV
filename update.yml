    - name: Guardar cambios en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Verificamos si el archivo realmente existe antes de agregarlo
        if [ -f "canal7mendoza.m3u" ]; then
          git add canal7mendoza.m3u
          # Hacemos commit solo si hubo cambios reales en el enlace
          git diff-index --quiet HEAD || git commit -m "Enlace M3U8 de transmisión actualizado"
          git push
        else
          echo "El archivo canal7mendoza.m3u no se generó. Saltando guardado."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

