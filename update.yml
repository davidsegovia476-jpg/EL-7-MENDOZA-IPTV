name: Actualizar Canal 7 por API

on:
  schedule:
    # Se ejecuta automáticamente cada 2 horas
    - cron: '0 */2 * * *'
  workflow_dispatch: # Botón para activarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias requeridas
      run: |
        pip install requests

    - name: Forzar creación previa del archivo
      # Esto evita el error fatal: pathspec en caso de que falle la conexión a internet
      run: touch canal7mendoza.m3u

    - name: Consultar API de El Siete y armar M3U
      run: python grabber.py

    - name: Guardar cambios de forma segura en GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        git add canal7mendoza.m3u
        # Commitea solo si el link del video cambió de ID en la API
        git diff-index --quiet HEAD || git commit -m "Renovación de enlace usando API de la web"
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

