name: Actualizador Automatico IPTV

on:
  schedule:
    # Se ejecuta de forma automática cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch: # Te permite presionar un botón para actualizar a mano cuando quieras

jobs:
  actualizar-lista:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Freno de mano por si YouTube tarda en responder

    steps:
    # 1. Descarga los archivos de tu repositorio en el servidor de GitHub
    - name: Clonar repositorio
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala yt-dlp que es indispensable para tu comando subprocess
    - name: Instalar yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    # 4. Abre y ejecuta tu script de Python para generar el .m3u
    - name: Ejecutar script de Python
      run: python EL_7_TELEVISION.py

    # 5. Guarda el archivo .m3u nuevo y lo sube a tu repositorio web
    - name: Guardar cambios en GitHub
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add EL_7_TELEVISION.m3u
        git commit -m "Token de Canal 7 renovado automaticamente" || echo "No hay cambios en la señal"
        git push
