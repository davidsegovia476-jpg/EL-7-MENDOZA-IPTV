    # 3. Instala la herramienta yt-dlp indispensable para tu código
    - name: Instala yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    # PASO DE DIAGNÓSTICO: Le pedimos a GitHub que nos muestre qué archivos ve
    - name: Ver lista de archivos en el servidor
      run: ls -la

    # 4. Abre y ejecuta tu script de Python
    - name: Ejecutar script de Python
      run: python servidor_iptv.py
