name: Actualizador Automatico IPTV

on:
  schedule:
    # Se ejecuta de forma automática cada 4 horas (en horario UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Te permite presionar un botón en GitHub para abrirlo manualmente

jobs:
  actualizar-lista:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el contenido de tu repositorio en el servidor de GitHub
    - name: Clonar repositorio
      uses: actions/checkout@v4

    # 2. Instala Python en el servidor
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala la herramienta yt-dlp indispensable para tu código
    - name: Instala yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    # 4. Abre y ejecuta tu script de Python
    - name: Ejecutar script de Python
      run: python EL_7_TELEVISION.py

    # 5. Guarda y sube los cambios del archivo .m3u a tu GitHub
    - name: Guardar cambios en el repositorio
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add EL_7_TELEVISION.m3u
        git commit -m "Lista IPTV actualizada automáticamente" || echo "No hay cambios en la señal"
        git push
