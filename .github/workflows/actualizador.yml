name: Actualizador Automatico IPTV

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4.2.2

      - name: Configurar Python en el servidor
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Instalar el extractor yt-dlp
        run: pip install yt-dlp

      - name: Crear archivo de cookies temporal
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Ejecutar el script extractor
        run: python servidor_iptv.py

      - name: Guardar y subir los cambios a GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add EL_7_TELEVISION.m3u
          git commit -m "Token generado con credenciales autenticadas" || exit 0
          git push
